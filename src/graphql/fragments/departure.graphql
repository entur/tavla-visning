fragment departure on EstimatedCall {
	quay {
		publicCode
		name
	}
	destinationDisplay {
		frontText
		via
	}
	aimedDepartureTime
	expectedDepartureTime
	aimedArrivalTime
	expectedArrivalTime
	serviceJourney {
		id
		transportMode
		transportSubmode
		line {
			id
			publicCode
			presentation {
				textColour
				colour
			}
		}
		quays(first: 1) {
			name
		}
	}
	cancellation
	realtime
	situations {
		...situation
	}
}
