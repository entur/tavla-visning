name: cd/tavla-visning

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  docker-build:
    uses: entur/gha-docker/.github/workflows/build.yml@v1.10.1
    with:
      context: .
      image_name: tavla-visning

  docker-push:
    needs: [docker-build]
    uses: entur/gha-docker/.github/workflows/push.yml@v1.10.1
    with:
      context: .
      image_name: tavla-visning

  helm-deploy-dev:
    needs: [docker-push]
    uses: entur/gha-helm/.github/workflows/deploy.yml@v1
    with:
      environment: dev
      chart: helm/tavla-visning
      image: ${{ needs.docker-push.outputs.image_name }}:${{ needs.docker-push.outputs.image_tag}}

  smoketest:
    needs: [helm-deploy-dev]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run BrowserStack smoketest
        run: pnpm smoketest
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          TEST_URL: https://vis-tavla.dev.entur.no
          BUILD_ID: ${{ github.run_id }}

  helm-deploy-prd:
    needs: [docker-push, smoketest]
    uses: entur/gha-helm/.github/workflows/deploy.yml@v1
    with:
      environment: prd
      chart: helm/tavla-visning
      image: ${{ needs.docker-push.outputs.image_name }}:${{ needs.docker-push.outputs.image_tag}}
